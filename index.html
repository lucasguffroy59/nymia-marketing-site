<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nymia - Period Protection Reminders</title>
    <meta name="description" content="Smart period protection change reminders to avoid toxic shock syndrome. Available in 12 languages.">
    
    <!-- Redirect based on browser language -->
    <script>
        (function() {
            // Check if we've already redirected (to prevent loops)
            const hasRedirected = sessionStorage.getItem('nymia_lang_redirected');
            
            if (!hasRedirected) {
                // Get user's preferred language
                const userLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
                
                // Map of supported languages
                const supportedLangs = {
                    'en': 'en',
                    'en-us': 'en',
                    'en-gb': 'en',
                    'fr': 'fr',
                    'fr-fr': 'fr',
                    'fr-ca': 'fr',
                    'es': 'es',
                    'es-es': 'es',
                    'es-mx': 'es',
                    'de': 'de',
                    'de-de': 'de',
                    'pt': 'pt',
                    'pt-pt': 'pt',
                    'pt-br': 'pt',
                    'nl': 'nl',
                    'nl-nl': 'nl',
                    'ar': 'ar',
                    'ar-sa': 'ar',
                    'zh': 'zh',
                    'zh-cn': 'zh',
                    'zh-tw': 'zh',
                    'hi': 'hi',
                    'hi-in': 'hi',
                    'bn': 'bn',
                    'bn-bd': 'bn',
                    'id': 'id',
                    'id-id': 'id',
                    'ru': 'ru',
                    'ru-ru': 'ru'
                };
                
                // Determine target language (fallback to English)
                let targetLang = 'en';
                
                if (supportedLangs[userLang]) {
                    targetLang = supportedLangs[userLang];
                } else {
                    // Try just the language code (e.g., 'fr' from 'fr-BE')
                    const langCode = userLang.split('-')[0];
                    if (supportedLangs[langCode]) {
                        targetLang = supportedLangs[langCode];
                    }
                }
                
                // Mark that we've done the redirect
                sessionStorage.setItem('nymia_lang_redirected', 'true');
                
                // Redirect to the appropriate language page
                const path = '/' + targetLang + '/';
                window.location.replace(path);
            }
        })();
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #FFFBFB 0%, #fef5f7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #4A4A4A;
        }
        
        .loader {
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            font-weight: 600;
            color: #E8AEBC;
            letter-spacing: 3px;
            margin-bottom: 24px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto;
            border: 4px solid rgba(232, 174, 188, 0.2);
            border-top-color: #E8AEBC;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .message {
            margin-top: 24px;
            font-size: 16px;
            opacity: 0.7;
        }
        
        .manual-links {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid rgba(232, 174, 188, 0.3);
        }
        
        .manual-links p {
            margin-bottom: 16px;
            font-size: 14px;
            opacity: 0.6;
        }
        
        .lang-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .lang-link {
            display: block;
            padding: 12px 16px;
            background: white;
            text-decoration: none;
            color: #4A4A4A;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .lang-link:hover {
            border-color: #E8AEBC;
            transform: translateY(-2px);
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="logo">NYMIA</div>
        <div class="spinner"></div>
        <p class="message">Redirecting to your language...</p>
        
        <div class="manual-links">
            <p>Or choose your language manually:</p>
            <div class="lang-grid">
                <a href="/en/" class="lang-link">🇬🇧 English</a>
                <a href="/fr/" class="lang-link">🇫🇷 Français</a>
                <a href="/es/" class="lang-link">🇪🇸 Español</a>
                <a href="/de/" class="lang-link">🇩🇪 Deutsch</a>
                <a href="/pt/" class="lang-link">🇵🇹 Português</a>
                <a href="/nl/" class="lang-link">🇳🇱 Nederlands</a>
                <a href="/ar/" class="lang-link">🇸🇦 العربية</a>
                <a href="/zh/" class="lang-link">🇨🇳 中文</a>
                <a href="/hi/" class="lang-link">🇮🇳 हिन्दी</a>
                <a href="/bn/" class="lang-link">🇧🇩 বাংলা</a>
                <a href="/id/" class="lang-link">🇮🇩 Bahasa</a>
                <a href="/ru/" class="lang-link">🇷🇺 Русский</a>
            </div>
        </div>
    </div>
    
    <!-- Fallback redirect for browsers without JS (extremely rare but good practice) -->
    <noscript>
        <meta http-equiv="refresh" content="0; url=/en/">
    </noscript>
</body>
</html>
